name: Foundational Design Skills OER
description: >-
  The project will cover two-dimensional art foundational design skills. The six
  design elements are “line, shape, mass/volume, perspective, texture, and
  color” (Sachant et al., 2016, p.49). The skills will be taught as individual
  lessons within the course. The goal of the course is for learners to identify
  and demonstrate the different art elements. They will also be able to
  categorize these elements in works of art.  
